<div class="auth-container">
  <div class="auth-card card">
    <h1>Register</h1>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" tuiTextfieldSize="m">
      <tui-textfield>
        <label tuiLabel>Email</label>
        <input tuiTextfield type="email" formControlName="email" placeholder="Enter your email">
      </tui-textfield>
      <tui-textfield>
        <label tuiLabel>Password</label>
        <input tuiTextfield type="password" formControlName="password" placeholder="Enter your password (min 6 characters)">
        <tui-icon tuiPassword />
      </tui-textfield>
      <tui-error [error]="error()" />
      <button tuiButton size="m" type="submit" [disabled]="loading()">
        {{ loading() ? 'Loading...' : 'Register' }}
      </button>
    </form>
    <p class="auth-link">
      Already have an account? <a tuiLink routerLink="/login">Login</a>
    </p>
  </div>
</div>
