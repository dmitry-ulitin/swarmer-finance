<form [formGroup]="form" (ngSubmit)="onSubmit()" class="form" tuiTextfieldSize="m">
    <tui-textfield tuiChevron [tuiTextfieldCleaner]="false" [stringify]="stringifyCategory"
        [identityMatcher]="identityMatcher">
        <label tuiLabel>Parent Category</label>
        <input tuiSelect formControlName="parent" />
        <tui-data-list *tuiTextfieldDropdown>
            @for (item of parentOptions(); track item.id) {
            <tui-tree [childrenHandler]="treeHandler()" [content]="treeNodeContent" [map]="treeMap"
                [tuiTreeController]="false" [value]="item" />
            }
        </tui-data-list>
    </tui-textfield>

    <div class="row">
        {{ prefix() }}
        <tui-textfield class="fill">
            <label tuiLabel>Name</label>
            <input tuiTextfield formControlName="name" placeholder="Category name" />
        </tui-textfield>
    </div>

    <div class="row">
        <tui-textfield [tuiTextfieldCleaner]="false" iconStart=" " class="fill">
            <label tuiLabel>Color</label>
            <input tuiInputColor formControlName="color" />
        </tui-textfield>
        <tui-icon [icon]="'@tui.' + form.value.icon" [style.color]="form.value.color" />
    </div>
    <tui-textfield>
        <label tuiLabel>Icon</label>
        <input tuiTextfield formControlName="icon" placeholder="e.g. home, star, wallet" />
    </tui-textfield>

    <tui-error [error]="error()" />

    <button tuiButton size="m" type="submit" [disabled]="loading()">
        {{ loading() ? 'Saving...' : (!!categoryId() ? 'Save Changes' : 'Create Category') }}
    </button>
</form>

<ng-template #treeNodeContent let-item>
    <button new tuiOption type="button" [value]="item" class="tree-option">
        <tui-icon [icon]="'@tui.' + item.icon" [style.color]="item.color" />
        {{ item.name }}
    </button>
</ng-template>
