<div class="header">
    <button tuiButton appearance="outline" size="s" (click)="categoriesState.reload()"
        [iconStart]="'@tui.refresh-cw'">Refresh</button>
    <button tuiButton appearance="outline" size="s" (click)="openCreateDialog()"
        [iconStart]="'@tui.plus'">Add Category</button>
    <button tuiButton appearance="outline" size="s" [disabled]="!isEditable()"
        [iconStart]="'@tui.pencil'" (click)="openEditDialog()">Edit</button>
    <button tuiButton appearance="outline" size="s" [disabled]="!isDeletable()"
        [iconStart]="'@tui.trash-2'" (click)="openDeleteDialog()">Delete</button>
</div>
<tui-loader [showLoader]="categoriesState.loading()" class="tree">
    @for (item of categories(); track item.id) {
    <tui-tree [childrenHandler]="handler" [content]="content" [map]="map" [tuiTreeController]="false" [value]="item" (toggled)="onToggled($event)" />
    }
</tui-loader>
<ng-template #content let-item>
    <span [class.active]="item.id===selected()" (click)="setAsSelected(item)" class="category">
        <tui-icon [icon]="'@tui.' + item.icon" class="icon" [style.color]="item.color" />{{ item.name }}
    </span>
</ng-template>
